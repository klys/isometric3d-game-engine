name: Unity Release Builds

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-unity-license:
    name: Validate Unity License Setup
    runs-on: ubuntu-latest
    steps:
      - name: Check required Unity secrets
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${UNITY_LICENSE}" ]]; then
            if [[ -z "${UNITY_EMAIL}" || -z "${UNITY_PASSWORD}" ]]; then
              echo "::error::UNITY_LICENSE is set, but UNITY_EMAIL and UNITY_PASSWORD are also required for GameCI activation."
              exit 1
            fi

            echo "Unity personal license secrets detected."
            exit 0
          fi

          if [[ -n "${UNITY_SERIAL}" ]]; then
            if [[ -z "${UNITY_EMAIL}" || -z "${UNITY_PASSWORD}" ]]; then
              echo "::error::UNITY_SERIAL is set, but UNITY_EMAIL and UNITY_PASSWORD are also required for GameCI activation."
              exit 1
            fi

            echo "Unity professional license secrets detected."
            exit 0
          fi

          echo "::error::Missing Unity activation secrets. Set UNITY_LICENSE + UNITY_EMAIL + UNITY_PASSWORD for Personal, or UNITY_SERIAL + UNITY_EMAIL + UNITY_PASSWORD for Pro."
          exit 1

  build:
    name: Build ${{ matrix.label }}
    needs: validate-unity-license
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneLinux64
            label: Linux
            artifactName: build-linux
            archiveName: isometric-game-engine-linux.zip
          - targetPlatform: StandaloneWindows64
            label: Windows
            artifactName: build-windows
            archiveName: isometric-game-engine-windows.zip
          - targetPlatform: StandaloneOSX
            label: macOS
            artifactName: build-macos
            archiveName: isometric-game-engine-macos.zip

    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        with:
          projectPath: .
          unityVersion: 6000.0.69f1
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: ${{ matrix.targetPlatform }}
          buildsPath: build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: build/${{ matrix.targetPlatform }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          cd release-artifacts/build-linux
          zip -r ../../dist/isometric-game-engine-linux.zip .

          cd ../build-windows
          zip -r ../../dist/isometric-game-engine-windows.zip .

          cd ../build-macos
          zip -r ../../dist/isometric-game-engine-macos.zip .

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: master-build-${{ github.run_number }}-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          gh release create "$RELEASE_TAG" dist/*.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Master build ${GITHUB_RUN_NUMBER} (${short_sha})" \
            --generate-notes
